name: drone-v2-prod

services:
  api:
    build:
      context: .
    image: "drone-v2-api:${API_IMAGE_TAG:-prod}"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&charset=utf8mb4&loc=Local&multiStatements=true"
      APP_ENV: production
      PORT: "8088"
      ENABLE_RESET_ENDPOINT: "${ENABLE_RESET_ENDPOINT:-false}"
      ENABLE_SNAPSHOT_WRITE_ENDPOINT: "${ENABLE_SNAPSHOT_WRITE_ENDPOINT:-false}"
      CORS_ALLOW_ORIGIN: "https://swvictory.com"
      INTEGRATION_MODE: "${INTEGRATION_MODE:-}"
      SMS_PROVIDER: "${SMS_PROVIDER:-}"
      SMS_CODE_PEPPER: "${SMS_CODE_PEPPER:-}"
      SMS_HTTP_ENDPOINT: "${SMS_HTTP_ENDPOINT:-}"
      SMS_HTTP_AUTH_HEADER: "${SMS_HTTP_AUTH_HEADER:-}"
      SMS_HTTP_AUTH_TOKEN: "${SMS_HTTP_AUTH_TOKEN:-}"
      SMS_HTTP_AUTH_HEADER_NAME: "${SMS_HTTP_AUTH_HEADER_NAME:-Authorization}"
      SMS_HTTP_TEMPLATE_ID: "${SMS_HTTP_TEMPLATE_ID:-}"
      SMS_HTTP_TEMPLATE_SIGN: "${SMS_HTTP_TEMPLATE_SIGN:-}"
      ALIYUN_SMS_HTTP_ENDPOINT: "${ALIYUN_SMS_HTTP_ENDPOINT:-}"
      ALIYUN_SMS_HTTP_AUTH_HEADER: "${ALIYUN_SMS_HTTP_AUTH_HEADER:-}"
      ALIYUN_SMS_TEMPLATE_CODE: "${ALIYUN_SMS_TEMPLATE_CODE:-}"
      ALIYUN_SMS_SIGN_NAME: "${ALIYUN_SMS_SIGN_NAME:-}"
      TENCENT_SMS_HTTP_ENDPOINT: "${TENCENT_SMS_HTTP_ENDPOINT:-}"
      TENCENT_SMS_HTTP_AUTH_HEADER: "${TENCENT_SMS_HTTP_AUTH_HEADER:-}"
      TENCENT_SMS_TEMPLATE_ID: "${TENCENT_SMS_TEMPLATE_ID:-}"
      TENCENT_SMS_SIGN_NAME: "${TENCENT_SMS_SIGN_NAME:-}"
      PROVIDER_PAYMENT_PREPAY_URL: "${PROVIDER_PAYMENT_PREPAY_URL:-}"
      PROVIDER_PAYMENT_NOTIFY_SECRET: "${PROVIDER_PAYMENT_NOTIFY_SECRET:-}"
      PROVIDER_AIRSPACE_APPLY_URL: "${PROVIDER_AIRSPACE_APPLY_URL:-}"
      PROVIDER_INSURANCE_QUOTE_URL: "${PROVIDER_INSURANCE_QUOTE_URL:-}"
      PROVIDER_CREDIT_SCORE_URL: "${PROVIDER_CREDIT_SCORE_URL:-}"
      PROVIDER_DRONE_ARM_URL: "${PROVIDER_DRONE_ARM_URL:-}"
      PROVIDER_HTTP_AUTH_HEADER: "${PROVIDER_HTTP_AUTH_HEADER:-}"
    expose:
      - "8088"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8088/api/v1/ready"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - drone-v2-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  caddy:
    image: caddy:2-alpine
    depends_on:
      - api
    environment:
      API_DOMAIN: "${API_DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../frontend:/srv/drone-v2-frontend:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  drone-v2-mysql-data:
  caddy-data:
  caddy-config:
