<style>
        /* Custom styles for atmospheric depth and technical cues */
        .tech-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(58, 73, 75, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(58, 73, 75, 0.1) 1px, transparent 1px);
        }
        
        .scan-line {
            background: linear-gradient(to bottom, transparent, rgba(0, 242, 255, 0.1), transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('button');
            if(btn) {
                btn.addEventListener('click', () => {
                    // Visual feedback for clicking the entry button before redirection
                    btn.classList.add('scale-95', 'opacity-80');
                    setTimeout(() => {
                        btn.classList.remove('scale-95', 'opacity-80');
                        // Placeholder for actual redirection logic
                        console.log('Redirecting to dashboard...');
                    }, 150);
                });
