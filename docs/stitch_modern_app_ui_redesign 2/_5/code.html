<script>
        // Simple interactive star rating
        const stars = document.querySelectorAll('.star-rating');
        stars.forEach((star, index) => {
            star.addEventListener('click', () => {
                stars.forEach((s, i) => {
                    if (i <= index) {
                        s.classList.add('active');
                        s.style.borderColor = 'rgba(245, 158, 11, 0.5)';
                    } else {
                        s.classList.remove('active');
                        s.style.borderColor = 'var(--tw-colors-outline-variant)';
                    }
                });
            });
        });
