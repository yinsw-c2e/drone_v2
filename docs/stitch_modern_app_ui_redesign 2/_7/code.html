<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>

<title>SkyLink Logistics - 启动页</title>

<style>
        /* Base typography overrides to align with custom font configurations */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0E14;
            color: #dfe2f0;
        }
        
        .font-data-mono { font-family: 'JetBrains Mono', monospace; }
        .font-headline-md, .font-display-lg, .font-headline-sm { font-family: 'Hanken Grotesk', sans-serif; }
        
        /* Atmospheric animations */
        @keyframes pulse-radar {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        
        .radar-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .radar-ring-1 { width: 150vw; height: 150vw; animation: pulse-radar 4s infinite linear; animation-delay: 0s;}
        .radar-ring-2 { width: 100vw; height: 100vw; animation: pulse-radar 4s infinite linear; animation-delay: 1.3s;}
        .radar-ring-3 { width: 50vw; height: 50vw; animation: pulse-radar 4s infinite linear; animation-delay: 2.6s;}

        /* Background Gradient */
        .bg-hero-gradient {
            background: linear-gradient(160deg, #0566d9 0%, #0B0E14 60%);
        }
        
        /* Role Card Hover Effects */
        .role-card {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: transparent;
            transition: background-color 0.3s ease;
        }
        
        .role-card:hover {
            border-color: #00F2FF;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.15);
            background-color: #1E2433;
        }
        
        .role-card:hover::before {
            background-color: #00F2FF;
        }
        
        .role-card-client:hover::before { background-color: #3B82F6; }
        .role-card-pilot:hover::before { background-color: #10B981; }
        .role-card-owner:hover::before { background-color: #8B5CF6; }
        .role-card-console:hover::before { background-color: #6B7280; }

        /* Icon glows */
        .icon-glow-client { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .icon-glow-pilot { box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .icon-glow-owner { box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }
        .icon-glow-console { box-shadow: 0 0 20px rgba(107, 114, 128, 0.4); }

    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen bg-bg-base overflow-hidden flex flex-col relative selection:bg-telemetry-cyan selection:text-bg-base">
<!-- Atmospheric Background -->
<div class="absolute inset-0 bg-hero-gradient opacity-40 z-0"></div>
<div class="absolute inset-0 overflow-hidden z-0 flex items-start justify-end pt-20 pr-10">
<div class="radar-ring radar-ring-1"></div>
<div class="radar-ring radar-ring-2"></div>
<div class="radar-ring radar-ring-3"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col w-full max-w-md mx-auto px-margin-mobile pt-16 pb-8 min-h-screen h-[884px]">
<!-- Header Section -->
<header class="flex justify-between items-start mb-10 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-telemetry-blue flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.5)]">
<span class="material-symbols-outlined text-white text-xl">flight_takeoff</span>
</div>
<div>
<h1 class="text-white font-headline-md font-bold tracking-tight text-lg leading-tight">低空指挥中心</h1>
<p class="text-on-surface-variant font-data-mono text-[10px] tracking-widest uppercase">LOW-ALTITUDE COMMAND CENTER</p>
</div>
</div>
<div class="flex items-center gap-1.5 px-3 py-1 bg-surface-container/50 border border-outline-variant/50 rounded-full backdrop-blur-sm">
<div class="w-2 h-2 rounded-full bg-status-success animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
<span class="text-on-surface font-body-md text-xs">演示环境</span>
</div>
</header>
<!-- Title & Slogan -->
<section class="mb-10 w-full">
<h2 class="text-white font-display-lg text-3xl font-bold mb-3 tracking-tight">选择身份进入系统</h2>
<p class="text-on-surface-variant font-body-md text-sm leading-relaxed max-w-[280px]">
                同一笔订单，贯通业主 · 飞手 · 机主 · 管理后台四端协同
            </p>
<!-- Quick Stats -->
<div class="flex gap-6 mt-6 pt-6 border-t border-outline-variant/30">
<div>
<div class="text-white font-headline-md font-semibold text-lg">实时</div>
<div class="text-on-surface-variant font-data-mono text-[10px] mt-1 tracking-wider">智能撮合</div>
</div>
<div>
<div class="text-white font-headline-md font-semibold text-lg">全链路</div>
<div class="text-on-surface-variant font-data-mono text-[10px] mt-1 tracking-wider">飞行可溯</div>
</div>
<div>
<div class="text-white font-headline-md font-semibold text-lg">5 方</div>
<div class="text-on-surface-variant font-data-mono text-[10px] mt-1 tracking-wider">分账透明</div>
</div>
</div>
</section>
<!-- Role Selection List -->
<section class="flex flex-col gap-4 w-full flex-grow">
<!-- Client Role -->
<button class="role-card role-card-client w-full bg-bg-surface border border-outline-variant/50 rounded-xl p-4 flex items-center gap-4 text-left group">

<span class="material-symbols-outlined text-white">home</span>
</div>
<div class="flex-grow">
<div class="flex justify-between items-baseline mb-1">

<span class="text-white font-headline-sm text-base">业主端</span>
<span class="text-telemetry-blue font-data-mono text-[10px] tracking-widest uppercase">CLIENT</span>
</div>

</div>

</div>

<!-- Pilot Role -->

</div>

<!-- Owner Role -->

</section>
