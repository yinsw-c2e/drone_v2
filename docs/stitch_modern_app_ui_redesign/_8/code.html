<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pilot Task Cockpit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#e8c423",
                        "telemetry-cyan": "#00F2FF",
                        "surface-container-highest": "#313540",
                        "on-tertiary-fixed": "#221b00",
                        "secondary": "#adc6ff",
                        "surface-variant": "#313540",
                        "on-primary": "#00363a",
                        "surface-dim": "#0f131d",
                        "on-secondary-container": "#e6ecff",
                        "outline-variant": "#3a494b",
                        "on-tertiary": "#3b2f00",
                        "on-primary-fixed": "#002022",
                        "on-background": "#dfe2f0",
                        "surface-bright": "#353944",
                        "on-primary-fixed-variant": "#004f54",
                        "primary-container": "#00f2ff",
                        "on-error-container": "#ffdad6",
                        "on-surface": "#dfe2f0",
                        "surface": "#0f131d",
                        "secondary-fixed-dim": "#adc6ff",
                        "surface-container-low": "#171b26",
                        "inverse-surface": "#dfe2f0",
                        "tertiary-fixed": "#ffe173",
                        "bg-surface": "#141822",
                        "tertiary-container": "#fed83a",
                        "on-primary-container": "#006a71",
                        "surface-container-high": "#262a34",
                        "status-critical": "#EF4444",
                        "primary": "#e1fdff",
                        "on-secondary": "#002e6a",
                        "primary-fixed": "#74f5ff",
                        "on-tertiary-container": "#725e00",
                        "on-surface-variant": "#b9cacb",
                        "on-secondary-fixed-variant": "#004395",
                        "bg-elevated": "#1E2433",
                        "secondary-fixed": "#d8e2ff",
                        "status-warning": "#F59E0B",
                        "on-secondary-fixed": "#001a42",
                        "bg-base": "#0B0E14",
                        "telemetry-blue": "#3B82F6",
                        "error": "#ffb4ab",
                        "outline": "#849495",
                        "surface-container-lowest": "#0a0e18",
                        "on-tertiary-fixed-variant": "#554500",
                        "inverse-primary": "#00696f",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "surface-tint": "#00dbe7",
                        "tertiary": "#fff6e4",
                        "inverse-on-surface": "#2c303b",
                        "background": "#0f131d",
                        "status-success": "#10B981",
                        "surface-container": "#1b1f2a",
                        "secondary-container": "#0566d9",
                        "primary-fixed-dim": "#00dbe7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "gutter": "16px",
                        "container-max-width": "1440px",
                        "margin-mobile": "16px",
                        "base-unit": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "data-mono": ["JetBrains Mono"],
                        "headline-sm": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "data-mono": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .radar-scan {
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 242, 255, 0.4) 100%);
            border-radius: 50%;
            animation: spin 4s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .grid-bg {
            background-image: 
                linear-gradient(to right, rgba(58, 73, 75, 0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(58, 73, 75, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-base text-on-surface font-body-md min-h-screen flex flex-col items-center">
<!-- Top Navigation Placeholder (Hidden for this specific task screen as it's a focused view, but structural shell exists) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-bg-base/80 backdrop-blur-md border-b border-outline-variant/30 hidden md:flex">
<div class="text-headline-md font-headline-md font-bold text-telemetry-cyan">SkyLink Logistics</div>
<div class="text-primary dark:text-primary flex items-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">signal_cellular_alt</span>
</div>
</header>
<!-- Main Mobile Container -->
<main class="w-full max-w-[390px] mx-auto bg-surface-container-lowest min-h-screen relative pb-24 shadow-2xl flex flex-col">
<!-- Header -->
<div class="px-margin-mobile pt-12 pb-4 flex items-center justify-between z-10 relative">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface tracking-wide uppercase">MISSION X-492</h1>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<!-- Radar Map Area -->
<div class="relative h-64 w-full bg-surface-container-low overflow-hidden border-b border-outline-variant/50">
<!-- Map Background (Placeholder Image) -->
<div class="absolute inset-0 bg-cover bg-center opacity-40 mix-blend-luminosity" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCPCpc0AaUU-Yzi0BItibq45x0RMRz3h_HhifmqJuUGpDEv6FNTqUoBe__9hlzZDueH9prnrvh_OBAlwkbsevPHVAwNTJtCJTOHsD5XNnOOVx1dbdX-qGmJHXWSVHLHqAafhmEA888RqQKyp80XQfepwCRxYS16_iPU9MxtxReX-UVgOFDDxLRhSSZAvnfr77QekPXIlwckB7UdT_s65OTmDq1eocE8wDEoYtPYx2fX393UjumeqyN9NNtRtz-mlJJZ3fzvIIBvSN7F');"></div>
<!-- Grid Overlay -->
<div class="absolute inset-0 grid-bg opacity-50"></div>
<!-- Radar Scanner -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 rounded-full border border-telemetry-cyan/20">
<div class="absolute inset-0 radar-scan"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 bg-telemetry-cyan rounded-full shadow-[0_0_10px_#00F2FF]"></div>
</div>
<!-- Route Line (Mockup) -->
<svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
<path class="opacity-70" d="M 50 200 Q 150 150 200 100 T 350 50" fill="none" stroke="#00F2FF" stroke-dasharray="4 4" stroke-width="2"></path>
<circle cx="50" cy="200" fill="#00F2FF" r="4"></circle>
<circle cx="350" cy="50" fill="#EF4444" r="4"></circle>
</svg>
<!-- Map Overlays -->
<div class="absolute top-4 right-4 bg-bg-elevated/80 backdrop-blur-md px-3 py-1 rounded-full border border-outline-variant/50 flex items-center gap-2">
<span class="w-2 h-2 bg-status-success rounded-full animate-pulse"></span>
<span class="font-label-caps text-label-caps text-status-success">TRACKING</span>
</div>
<div class="absolute bottom-4 left-4 bg-bg-elevated/80 backdrop-blur-md px-3 py-2 rounded-lg border border-outline-variant/50">
<div class="font-label-caps text-label-caps text-on-surface-variant">TARGET COORDINATES</div>
<div class="font-data-mono text-data-mono text-telemetry-cyan">34.0522° N, 118.2437° W</div>
</div>
</div>
<div class="px-margin-mobile flex-1 flex flex-col gap-6 py-6">
<!-- Status Pill -->
<div class="flex justify-center">
<div class="bg-surface-container-high border border-outline-variant px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-status-success" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-headline-sm text-headline-sm text-status-success">MISSION SETTLED</span>
</div>
</div>
<!-- Pre-flight Checklist (Completed) -->
<section class="bg-bg-surface rounded-xl border border-outline-variant/50 p-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">checklist</span> PRE-FLIGHT CHECKLIST
                </h2>
<div class="space-y-3">
<div class="flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Systems Calibration</span>
<span class="material-symbols-outlined text-telemetry-blue">done</span>
</div>
<div class="w-full h-px bg-outline-variant/30"></div>
<div class="flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Payload Secure</span>
<span class="material-symbols-outlined text-telemetry-blue">done</span>
</div>
<div class="w-full h-px bg-outline-variant/30"></div>
<div class="flex items-center justify-between">
<span class="font-body-md text-body-md text-on-surface">Airspace Clearance</span>
<span class="material-symbols-outlined text-telemetry-blue">done</span>
</div>
</div>
</section>
<!-- Telemetry Data Grid -->
<section class="grid grid-cols-2 gap-4">
<!-- Altitude -->
<div class="bg-bg-surface rounded-xl border border-outline-variant/50 p-4 hover:border-telemetry-cyan/50 transition-colors shadow-lg">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-2">ALTITUDE</div>
<div class="flex items-end gap-1">
<span class="font-display-lg text-display-lg text-on-surface">450</span>
<span class="font-data-mono text-data-mono text-on-surface-variant mb-1">m</span>
</div>
<div class="w-full bg-surface-container-high h-1 mt-3 rounded-full overflow-hidden">
<div class="bg-telemetry-cyan h-full w-[60%]"></div>
</div>
</div>
<!-- Speed -->
<div class="bg-bg-surface rounded-xl border border-outline-variant/50 p-4 hover:border-telemetry-cyan/50 transition-colors shadow-lg">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-2">SPEED</div>
<div class="flex items-end gap-1">
<span class="font-display-lg text-display-lg text-on-surface">65</span>
<span class="font-data-mono text-data-mono text-on-surface-variant mb-1">km/h</span>
</div>
<div class="w-full bg-surface-container-high h-1 mt-3 rounded-full overflow-hidden">
<div class="bg-telemetry-blue h-full w-[45%]"></div>
</div>
</div>
<!-- Battery -->
<div class="bg-bg-surface rounded-xl border border-outline-variant/50 p-4 hover:border-telemetry-cyan/50 transition-colors shadow-lg">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-2">BATTERY</div>
<div class="flex items-end gap-1">
<span class="font-display-lg text-display-lg text-status-warning">28</span>
<span class="font-data-mono text-data-mono text-on-surface-variant mb-1">%</span>
</div>
<div class="w-full bg-surface-container-high h-1 mt-3 rounded-full overflow-hidden">
<div class="bg-status-warning h-full w-[28%]"></div>
</div>
</div>
<!-- Yaw/Pitch -->
<div class="bg-bg-surface rounded-xl border border-outline-variant/50 p-4 hover:border-telemetry-cyan/50 transition-colors shadow-lg">
<div class="font-label-caps text-label-caps text-on-surface-variant mb-2">YAW (DEV)</div>
<div class="flex items-end gap-1">
<span class="font-display-lg text-display-lg text-on-surface">+2.4</span>
<span class="font-data-mono text-data-mono text-on-surface-variant mb-1">°</span>
</div>
<div class="flex justify-between mt-3 px-1">
<div class="w-1 h-2 bg-outline-variant"></div>
<div class="w-1 h-3 bg-telemetry-cyan"></div>
<div class="w-1 h-2 bg-outline-variant"></div>
</div>
</div>
</section>
</div>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full md:w-[390px] md:left-1/2 md:-translate-x-1/2 bg-surface-container border-t border-outline-variant/50 px-margin-mobile py-4 flex gap-4 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<button class="flex-1 bg-transparent border border-telemetry-blue text-telemetry-blue font-headline-sm text-headline-sm rounded-lg py-3 hover:bg-telemetry-blue/10 transition-colors flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]">assignment_turned_in</span>
                DISPOSAL INST.
            </button>
<button class="flex-1 bg-telemetry-cyan text-bg-base font-headline-sm text-headline-sm rounded-lg py-3 hover:bg-primary-fixed transition-colors flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[20px]">receipt_long</span>
                VIEW SETTLEMENT
            </button>
</div>
</main>
</body></html>
