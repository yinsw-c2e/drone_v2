name: Deploy main to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_BACKEND_URL: https://swvictory.com
      VITE_DISABLE_LOCAL_DB_PERSIST: "1"
      VITE_AMAP_WEB_KEY: ${{ secrets.VITE_AMAP_WEB_KEY }}
      VITE_AMAP_SECURITY_CODE: ${{ secrets.VITE_AMAP_SECURITY_CODE }}
      VITE_AMAP_WEB_SERVICE_KEY: ${{ secrets.VITE_AMAP_WEB_SERVICE_KEY }}
      DEPLOY_HOST: 106.55.151.5
      DEPLOY_USER: ubuntu
      DEPLOY_PORT: "22"
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Check required secrets
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::Missing GitHub Actions secret DEPLOY_SSH_KEY. Add the private SSH key that can log in to ubuntu@106.55.151.5."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Frontend tests
        run: pnpm test

      - name: Backend tests
        run: pnpm backend:test

      - name: Release preflight and H5 build
        env:
          VITE_PROVIDER_MODE: backend
        run: pnpm build:h5:release

      - name: Package release
        run: |
          test -f dist/build/h5/index.html
          release_dir="/tmp/drone-v2-release-${GITHUB_SHA}"
          rm -rf "$release_dir"
          mkdir -p "$release_dir/dist/build"
          rsync -a backend "$release_dir"/
          rsync -a dist/build/h5 "$release_dir/dist/build"/
          tar -C "$release_dir" -czf /tmp/drone-v2-release-${GITHUB_SHA}.tgz .
          ls -lh /tmp/drone-v2-release-${GITHUB_SHA}.tgz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/drone_v2_deploy_key
          chmod 600 ~/.ssh/drone_v2_deploy_key
          ssh-keygen -y -f ~/.ssh/drone_v2_deploy_key > ~/.ssh/drone_v2_deploy_key.pub
          fingerprint="$(ssh-keygen -lf ~/.ssh/drone_v2_deploy_key.pub | awk '{print $2}')"
          expected="SHA256:+bsdP/7OgZcTj62UgKDrA/o4C3zda+2kdGx0x/RDu+0"
          if [ "$fingerprint" != "$expected" ]; then
            echo "::error::DEPLOY_SSH_KEY fingerprint mismatch. Expected $expected, got $fingerprint."
            exit 1
          fi
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH login
        run: |
          ssh \
            -i ~/.ssh/drone_v2_deploy_key \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "echo deploy-ssh-ok"

      - name: Upload release
        timeout-minutes: 5
        run: |
          archive="/tmp/drone-v2-release-${GITHUB_SHA}.tgz"
          remote_archive="/tmp/drone-v2-release-${GITHUB_SHA}.tgz"
          archive_size="$(wc -c < "$archive" | tr -d ' ')"
          remote_cmd="set -e; head -c ${archive_size} > ${remote_archive}; actual_size=\$(wc -c < ${remote_archive} | tr -d ' '); test \"\$actual_size\" = \"${archive_size}\""
          ssh \
            -i ~/.ssh/drone_v2_deploy_key \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "$remote_cmd" \
            < "$archive"

      - name: Deploy on server
        timeout-minutes: 20
        run: |
          ssh \
            -i ~/.ssh/drone_v2_deploy_key \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "RELEASE_SHA='${GITHUB_SHA}' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          umask 077

          APP_ROOT=/opt/drone_v2
          RELEASES_DIR="$APP_ROOT/releases"
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_SHA"
          ARCHIVE="/tmp/drone-v2-release-$RELEASE_SHA.tgz"
          FRONTEND_DIR="$APP_ROOT/frontend"
          BACKUP_FRONTEND_DIR="$APP_ROOT/frontend.prev"
          BACKEND_DIR="$APP_ROOT/backend"
          BACKUP_BACKEND_DIR="$APP_ROOT/.deploy/backend.prev"
          DATABASE_BACKUPS_DIR="$APP_ROOT/backups"
          ENV_FILE="$BACKEND_DIR/.env"
          COMPOSE_FILE="$BACKEND_DIR/docker-compose.prod.yml"
          PREVIOUS_SHA="$(cat "$APP_ROOT/.deploy/deployed-main.commit" 2>/dev/null || true)"
          PREVIOUS_TAG="${PREVIOUS_SHA:-prod}"
          if ! docker image inspect "drone-v2-api:$PREVIOUS_TAG" >/dev/null 2>&1; then
            PREVIOUS_TAG=prod
          fi
          DEPLOYMENT_STARTED=false
          CONFIG_BACKED_UP=false
          FRONTEND_BACKED_UP=false
          CANDIDATE_CONTAINER=""

          env_value() {
            sed -n "s/^$1=//p" "$ENV_FILE" | tail -n 1
          }

          validate_server_env() {
            local sms_provider sms_endpoint sms_code_pepper aliyun_access_key_id aliyun_access_key_secret object_storage_hosts integration_mode allow_production_demo_data key value
            sms_code_pepper="$(env_value SMS_CODE_PEPPER)"
            if [ "${#sms_code_pepper}" -lt 32 ]; then
              echo "::error::Server .env SMS_CODE_PEPPER must contain at least 32 characters."
              return 1
            fi
            sms_provider="$(env_value SMS_PROVIDER | tr '[:upper:]' '[:lower:]')"
            case "$sms_provider" in
              http)
                sms_endpoint="$(env_value SMS_HTTP_ENDPOINT)"
                ;;
              aliyun)
                aliyun_access_key_id="$(env_value ALIYUN_SMS_ACCESS_KEY_ID)"
                aliyun_access_key_secret="$(env_value ALIYUN_SMS_ACCESS_KEY_SECRET)"
                if [ -n "$aliyun_access_key_id" ] || [ -n "$aliyun_access_key_secret" ]; then
                  for key in \
                    ALIYUN_SMS_ACCESS_KEY_ID \
                    ALIYUN_SMS_ACCESS_KEY_SECRET \
                    ALIYUN_SMS_SIGN_NAME \
                    ALIYUN_SMS_TEMPLATE_CODE; do
                    value="$(env_value "$key")"
                    if [ -z "$value" ]; then
                      echo "::error::Server .env is missing $key for direct Aliyun SMS."
                      return 1
                    fi
                  done
                  sms_endpoint="direct"
                else
                  sms_endpoint="$(env_value ALIYUN_SMS_HTTP_ENDPOINT)"
                  [ -n "$sms_endpoint" ] || sms_endpoint="$(env_value SMS_HTTP_ENDPOINT)"
                fi
                ;;
              tencent)
                sms_endpoint="$(env_value TENCENT_SMS_HTTP_ENDPOINT)"
                [ -n "$sms_endpoint" ] || sms_endpoint="$(env_value SMS_HTTP_ENDPOINT)"
                ;;
              *)
                echo "::error::Server .env must set SMS_PROVIDER=http, aliyun, or tencent before production deployment."
                return 1
                ;;
            esac
            if [ -z "$sms_endpoint" ]; then
              echo "::error::Server .env is missing the configured SMS HTTP endpoint or complete Aliyun direct credentials."
              return 1
            fi

            object_storage_hosts="$(env_value OBJECT_STORAGE_ALLOWED_HOSTS)"
            if [ -z "$object_storage_hosts" ]; then
              echo "::error::Server .env is missing OBJECT_STORAGE_ALLOWED_HOSTS."
              return 1
            fi

            integration_mode="$(env_value INTEGRATION_MODE | tr '[:upper:]' '[:lower:]')"
            case "$integration_mode" in
              sandbox)
                ;;
              live)
                for key in \
                  PROVIDER_PAYMENT_PREPAY_URL \
                  PROVIDER_PAYMENT_NOTIFY_SECRET \
                  PROVIDER_AIRSPACE_APPLY_URL \
                  PROVIDER_INSURANCE_QUOTE_URL \
                  PROVIDER_CREDIT_SCORE_URL \
                  PROVIDER_DRONE_ARM_URL; do
                  value="$(env_value "$key")"
                  if [ -z "$value" ]; then
                    echo "::error::Server .env is missing $key for INTEGRATION_MODE=live."
                    return 1
                  fi
                done
                value="$(env_value PROVIDER_PAYMENT_NOTIFY_SECRET)"
                if [ "${#value}" -lt 32 ]; then
                  echo "::error::Server .env PROVIDER_PAYMENT_NOTIFY_SECRET must contain at least 32 characters."
                  return 1
                fi
                ;;
              *)
                echo "::error::Server .env must explicitly set INTEGRATION_MODE=sandbox or live."
                return 1
                ;;
            esac

            allow_production_demo_data="$(env_value ALLOW_PRODUCTION_DEMO_DATA | tr '[:upper:]' '[:lower:]')"
            case "$allow_production_demo_data" in
              ""|0|false|no|off)
                ;;
              1|true|yes|on)
                if [ "$integration_mode" != "sandbox" ]; then
                  echo "::error::ALLOW_PRODUCTION_DEMO_DATA is only permitted with INTEGRATION_MODE=sandbox."
                  return 1
                fi
                echo "::warning::Production is running in explicit closed-beta demo-data mode."
                ;;
              *)
                echo "::error::Server .env ALLOW_PRODUCTION_DEMO_DATA must be a boolean value."
                return 1
                ;;
            esac
          }

          rollback() {
            if [ "$DEPLOYMENT_STARTED" != true ]; then
              return
            fi
            echo "Deployment failed; rolling back frontend and API to $PREVIOUS_TAG"
            if [ "$CONFIG_BACKED_UP" = true ]; then
              install -m 0644 "$BACKUP_BACKEND_DIR/Caddyfile" "$BACKEND_DIR/Caddyfile" || true
              install -m 0644 "$BACKUP_BACKEND_DIR/docker-compose.prod.yml" "$COMPOSE_FILE" || true
            fi
            if [ "$FRONTEND_BACKED_UP" = true ]; then
              rsync -a --delete "$BACKUP_FRONTEND_DIR"/ "$FRONTEND_DIR"/ || true
            fi
            if docker image inspect "drone-v2-api:$PREVIOUS_TAG" >/dev/null 2>&1; then
              API_IMAGE_TAG="$PREVIOUS_TAG" docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --no-deps --force-recreate api caddy || true
            fi
          }

          dump_deploy_state() {
            echo "::group::docker compose ps"
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps || true
            echo "::endgroup::"
            echo "::group::api logs"
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --tail=200 api || true
            echo "::endgroup::"
            echo "::group::caddy logs"
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --tail=120 caddy || true
            echo "::endgroup::"
          }

          cleanup_candidate() {
            if [ -n "$CANDIDATE_CONTAINER" ]; then
              docker rm -f "$CANDIDATE_CONTAINER" >/dev/null 2>&1 || true
              CANDIDATE_CONTAINER=""
            fi
          }

          on_exit() {
            local status=$?
            trap - EXIT
            set +e
            cleanup_candidate
            if [ "$status" -ne 0 ]; then
              rollback
              dump_deploy_state
            fi
            exit "$status"
          }

          trap on_exit EXIT

          test -f "$ARCHIVE"
          test -f "$ENV_FILE"
          test -f "$COMPOSE_FILE"
          validate_server_env

          mkdir -p "$RELEASES_DIR" "$APP_ROOT/.deploy" "$DATABASE_BACKUPS_DIR"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "$ARCHIVE" -C "$RELEASE_DIR"

          test -f "$RELEASE_DIR/dist/build/h5/index.html"
          test -f "$RELEASE_DIR/backend/Dockerfile"
          test -f "$RELEASE_DIR/backend/Caddyfile"
          test -f "$RELEASE_DIR/backend/docker-compose.prod.yml"

          DATABASE_BACKUP="$DATABASE_BACKUPS_DIR/drone_v2-before-$RELEASE_SHA.sql.gz"
          docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" exec -T mysql \
            sh -lc 'exec mysqldump --single-transaction --no-tablespaces --default-character-set=utf8mb4 -u"$MYSQL_USER" -p"$MYSQL_PASSWORD" "$MYSQL_DATABASE"' </dev/null \
            | gzip -9 > "$DATABASE_BACKUP"
          test -s "$DATABASE_BACKUP"

          docker build -t "drone-v2-api:$RELEASE_SHA" "$RELEASE_DIR/backend"

          CANDIDATE_COMPOSE_FILE="$RELEASE_DIR/backend/docker-compose.prod.yml"
          CANDIDATE_CONTAINER="$(API_IMAGE_TAG="$RELEASE_SHA" docker compose --env-file "$ENV_FILE" -f "$CANDIDATE_COMPOSE_FILE" run -d --no-deps -e PORT=18088 api)"
          CANDIDATE_READY=false
          for attempt in $(seq 1 15); do
            if docker exec "$CANDIDATE_CONTAINER" wget -q -O - http://127.0.0.1:18088/api/v1/ready >/dev/null 2>&1; then
              CANDIDATE_READY=true
              break
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' "$CANDIDATE_CONTAINER" 2>/dev/null || true)" != true ]; then
              break
            fi
            sleep 2
          done
          if [ "$CANDIDATE_READY" != true ]; then
            echo "::error::Candidate API failed production readiness before deployment mutation."
            docker logs "$CANDIDATE_CONTAINER" 2>&1 || true
            exit 1
          fi
          cleanup_candidate

          mkdir -p "$BACKUP_BACKEND_DIR" "$FRONTEND_DIR" "$BACKUP_FRONTEND_DIR"
          install -m 0644 "$BACKEND_DIR/Caddyfile" "$BACKUP_BACKEND_DIR/Caddyfile"
          install -m 0644 "$COMPOSE_FILE" "$BACKUP_BACKEND_DIR/docker-compose.prod.yml"
          CONFIG_BACKED_UP=true
          rsync -a --delete "$FRONTEND_DIR"/ "$BACKUP_FRONTEND_DIR"/
          FRONTEND_BACKED_UP=true
          DEPLOYMENT_STARTED=true

          install -m 0644 "$RELEASE_DIR/backend/Caddyfile" "$BACKEND_DIR/Caddyfile"
          install -m 0644 "$RELEASE_DIR/backend/docker-compose.prod.yml" "$COMPOSE_FILE"
          rsync -a --delete "$RELEASE_DIR/dist/build/h5"/ "$FRONTEND_DIR"/

          API_IMAGE_TAG="$RELEASE_SHA" docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --no-deps --force-recreate api caddy
          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 10 https://swvictory.com/api/v1/ready >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              exit 1
            fi
            sleep 5
          done

          printf '%s' "$RELEASE_SHA" > "$APP_ROOT/.deploy/deployed-main.commit"
          DEPLOYMENT_STARTED=false
          rm -f "$ARCHIVE"
          find "$RELEASES_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -n \
            | head -n -5 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
          find "$DATABASE_BACKUPS_DIR" -type f -name 'drone_v2-before-*.sql.gz' -mtime +14 -delete
          REMOTE
